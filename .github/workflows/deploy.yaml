name: Build and Deploy

on:
  push:
    branches:
      - main  

jobs:
  build-and-deploy:
    permissions:
      contents: read
      packages: write
      actions: write
      secrets: write
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Setup Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'  

    - name: Install dependencies
      run: npm install

    - name: Build React app
      run: npm run build

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@4.1.5
      with:
        branch: gh-pages
        folder: build  
        token: ${{ github.token }}
